## IDF Component Manager Manifest File
dependencies:
  espressif/mdns: ~1.1.0
  espressif/tinyusb:
    rules:
    - if: target in [esp32s2, esp32s3, esp32p4]
    # Temporary workaround for https://github.com/hathach/tinyusb/issues/3154
    # Can be removed once fix is released in espressif/tinyusb
    git: https://github.com/micropython/tinyusb-espressif.git
    version: cherrypick/dwc2_zlp_fix
  espressif/esp-sr: ~2.1.5
  espressif/esp_audio_codec: ~2.3
  espressif/esp_audio_effects: ~1.1
  espressif/esp_video_codec: ~0.5.2
  espressif/esp_image_effects: ~1.0.0
  espressif/esp_muxer: ^1.1
  espressif/esp32-camera: ^2.0
  espressif/esp_video:
    version: ^1.2.0
    # matches:
    #   - if: "$CONFIG{ESP_BOARD_DEV_CAMERA_SUPPORT} == True"
  espressif/esp_codec_dev:
    version: ~1.5
    # matches:
    #   - if: "$CONFIG{ESP_BOARD_DEV_AUDIO_CODEC_SUPPORT} == True"
  # espressif/esp_lvgl_port: "2.7.0"
  espressif/gmf_loader:
    override_path: ../../esp-gmf/packages/gmf_loader
  espressif/gmf_app_utils:
    override_path: ../../esp-gmf/packages/gmf_app_utils
  espressif/esp_capture:
    override_path: ../../esp-gmf/packages/esp_capture
  espressif/esp_board_manager:
    override_path: ../../esp-gmf/packages/esp_board_manager
  espressif/esp_audio_simple_player:
    override_path: ../../esp-gmf/packages/esp_audio_simple_player
  espressif/gmf_core:
    override_path: ../../esp-gmf/gmf_core
  espressif/gmf_io:
    override_path: ../../esp-gmf/elements/gmf_io
  espressif/gmf_audio:
    override_path: ../../esp-gmf/elements/gmf_audio
  espressif/gmf_ai_audio:
    override_path: ../../esp-gmf/elements/gmf_ai_audio
  espressif/gmf_video:
    override_path: ../../esp-gmf/elements/gmf_video
  espressif/gmf_misc:
    override_path: ../../esp-gmf/elements/gmf_misc
  idf:
    version: '>=5.2.0'
  joltwallet/littlefs: ==1.20.4
